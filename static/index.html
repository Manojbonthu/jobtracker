<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JobTracker Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4ff;
    --surface: #ffffff;
    --surface2: #f7f9ff;
    --border: #dde4f5;
    --border2: #c8d3ef;
    --accent: #4361ee;
    --accent2: #3a0ca3;
    --accent-light: rgba(67,97,238,0.08);
    --accent-mid: rgba(67,97,238,0.15);
    --green: #06d6a0;
    --green-bg: rgba(6,214,160,0.1);
    --red: #ef233c;
    --red-bg: rgba(239,35,60,0.08);
    --orange: #f8961e;
    --orange-bg: rgba(248,150,30,0.08);
    --purple-bg: rgba(58,12,163,0.07);
    --text: #1a1d3a;
    --text2: #4a5280;
    --text3: #9ba3cc;
    --sans: 'Plus Jakarta Sans', sans-serif;
    --body: 'Inter', sans-serif;
    --radius: 12px;
    --radius-sm: 8px;
    --sidebar: 320px;
    --tr: 0.18s ease;
    --shadow: 0 2px 12px rgba(67,97,238,0.08);
    --shadow-md: 0 4px 24px rgba(67,97,238,0.12);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--body); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

  /* HEADER */
  header { display: flex; align-items: center; gap: 14px; padding: 0 28px; height: 64px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 17px; box-shadow: 0 4px 12px rgba(67,97,238,0.3); }
  .logo-text { font-family: var(--sans); font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
  .logo-text span { color: var(--accent); }
  header .spacer { flex: 1; }
  .header-badge { font-size: 12px; font-weight: 600; color: var(--accent); background: var(--accent-light); border: 1px solid rgba(67,97,238,0.2); padding: 5px 14px; border-radius: 20px; }

  /* LAYOUT */
  .layout { display: flex; flex: 1; min-height: 0; }

  /* SIDEBAR */
  aside { width: var(--sidebar); flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); padding: 24px 20px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
  .sidebar-label { font-family: var(--sans); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: var(--text3); text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .sidebar-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  textarea#rawPost { width: 100%; height: 240px; resize: vertical; background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--body); font-size: 13px; line-height: 1.7; padding: 14px; outline: none; transition: border-color var(--tr), box-shadow var(--tr); }
  textarea#rawPost::placeholder { color: var(--text3); }
  textarea#rawPost:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); background: #fff; }
  .char-count { font-size: 11px; color: var(--text3); text-align: right; margin-top: -12px; }
  .btn-extract { width: 100%; padding: 14px 20px; background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%); border: none; border-radius: var(--radius); color: #fff; font-family: var(--sans); font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity var(--tr), transform var(--tr), box-shadow var(--tr); box-shadow: 0 4px 16px rgba(67,97,238,0.35); }
  .btn-extract:hover:not(:disabled) { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(67,97,238,0.45); }
  .btn-extract:disabled { opacity: 0.5; cursor: not-allowed; }
  .spinner { width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
  .btn-extract.loading .spinner { display: block; }
  .btn-extract.loading .btn-icon { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .tip-box { background: var(--accent-light); border: 1px solid rgba(67,97,238,0.15); border-radius: var(--radius); padding: 13px 15px; }
  .tip-box p { font-size: 12.5px; color: var(--text2); line-height: 1.65; }
  .tip-box strong { color: var(--accent); font-weight: 600; }
  .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .stat-card .val { font-family: var(--sans); font-size: 28px; font-weight: 700; color: var(--accent); line-height: 1; }
  .stat-card .lbl { font-size: 12px; color: var(--text3); margin-top: 5px; font-weight: 500; }

  /* MAIN */
  main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; background: var(--bg); }
  .main-toolbar { padding: 20px 28px 0; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .main-toolbar h2 { font-family: var(--sans); font-size: 17px; font-weight: 700; color: var(--text); flex: 1; min-width: 120px; }
  .main-toolbar h2 span { color: var(--text3); font-weight: 400; font-size: 14px; }
  .search-wrap { position: relative; flex: 1; max-width: 300px; min-width: 160px; }
  .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
  #searchInput { width: 100%; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: var(--body); font-size: 13px; padding: 9px 12px 9px 34px; outline: none; transition: border-color var(--tr); }
  #searchInput::placeholder { color: var(--text3); }
  #searchInput:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }

  /* TABLE */
  .table-area { flex: 1; overflow-y: auto; padding: 16px 28px 28px; }
  .table-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--surface2); }
  th { font-family: var(--sans); font-size: 11px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text3); font-weight: 700; padding: 13px 16px; border-bottom: 1px solid var(--border); text-align: left; white-space: nowrap; }
  tbody tr { transition: background var(--tr); border-bottom: 1px solid var(--border); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover > td { background: var(--surface2); }
  td { padding: 15px 16px; color: var(--text2); vertical-align: middle; background: var(--surface); transition: background var(--tr); font-size: 14px; }
  tr.expanded-row > td { background: rgba(67,97,238,0.05) !important; }
  .td-num { font-size: 12px; color: var(--text3); font-weight: 600; width: 36px; }
  .td-role { font-weight: 600; color: var(--text); font-family: var(--sans); font-size: 14px; min-width: 140px; }
  .td-location { display: flex; align-items: center; gap: 7px; min-width: 120px; font-size: 13.5px; }
  .loc-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 0 3px var(--green-bg); }
  .email-cell { display: flex; align-items: center; gap: 7px; min-width: 170px; }
  .email-text { font-size: 13px; color: var(--accent); font-weight: 500; }
  .null-val { font-size: 12px; color: var(--text3); }
  .btn-copy { padding: 4px 10px; background: var(--accent-light); border: 1px solid rgba(67,97,238,0.2); border-radius: 5px; color: var(--accent); font-size: 10px; font-weight: 700; cursor: pointer; transition: background var(--tr); flex-shrink: 0; letter-spacing: 0.05em; }
  .btn-copy:hover { background: var(--accent-mid); }
  .btn-copy.copied { color: #038060; border-color: rgba(6,214,160,0.3); background: var(--green-bg); }
  .desc-short { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; color: var(--text2); }

  /* DATE — bigger and more visible */
  .date-text { font-size: 13px; color: var(--text2); white-space: nowrap; font-weight: 500; }

  /* ACTIONS */
  .actions-cell { display: flex; gap: 7px; align-items: center; }
  .btn-expand { display: inline-flex; align-items: center; gap: 5px; padding: 6px 13px; background: var(--accent-light); border: 1px solid rgba(67,97,238,0.2); border-radius: 7px; color: var(--accent); font-size: 12px; font-weight: 600; cursor: pointer; transition: all var(--tr); white-space: nowrap; font-family: var(--sans); }
  .btn-expand:hover { background: var(--accent-mid); }
  .btn-expand.open { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-expand .chevron { transition: transform 0.22s ease; display: inline-block; font-size: 10px; font-style: normal; }
  .btn-expand.open .chevron { transform: rotate(180deg); }
  .btn-delete { padding: 6px 13px; background: transparent; border: 1px solid rgba(239,35,60,0.2); border-radius: 7px; color: rgba(239,35,60,0.7); font-size: 12px; font-weight: 500; cursor: pointer; transition: all var(--tr); white-space: nowrap; font-family: var(--sans); }
  .btn-delete:hover { background: var(--red-bg); border-color: var(--red); color: var(--red); }

  /* EXPANDED DETAIL PANEL */
  .detail-row > td { padding: 0 !important; background: var(--surface) !important; border-bottom: 2px solid var(--accent) !important; }
  .detail-inner { overflow: hidden; max-height: 0; transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1); }
  .detail-inner.open { max-height: 2000px; }
  .detail-content { padding: 20px 24px 24px; background: linear-gradient(135deg, #f8faff 0%, #f0f4ff 100%); border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 14px; }

  .detail-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow); }
  .detail-section-title { font-family: var(--sans); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; display: flex; align-items: center; gap: 7px; }
  .detail-section-title::before { content: ''; width: 3px; height: 15px; background: var(--accent); border-radius: 2px; }

  /* SKILLS */
  .skills-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .skill-chip { padding: 5px 13px; border-radius: 20px; font-size: 12.5px; font-weight: 500; white-space: nowrap; border: 1px solid transparent; }
  .skill-chip.tech { background: var(--purple-bg); border-color: rgba(58,12,163,0.2); color: var(--accent2); }
  .skill-chip.soft { background: var(--green-bg); border-color: rgba(6,214,160,0.25); color: #038060; }
  .skill-chip.exp  { background: var(--orange-bg); border-color: rgba(248,150,30,0.25); color: #b56d00; }
  .skill-chip.gen  { background: var(--accent-light); border-color: rgba(67,97,238,0.2); color: var(--accent2); }

  /* FULL DESCRIPTION */
  .full-desc { font-size: 13.5px; line-height: 1.8; color: var(--text2); white-space: pre-wrap; word-break: break-word; }

  /* RAW POST TOGGLE */
  .raw-post-toggle { display: flex; align-items: center; justify-content: space-between; cursor: pointer; padding: 14px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); user-select: none; transition: background var(--tr); }
  .raw-post-toggle:hover { background: var(--surface2); }
  .raw-post-toggle-left { display: flex; align-items: center; gap: 8px; font-family: var(--sans); font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text); }
  .raw-post-toggle-left::before { content: ''; width: 3px; height: 15px; background: var(--accent); border-radius: 2px; }
  .raw-chevron { font-size: 11px; color: var(--text3); transition: transform 0.22s ease; display: inline-block; }
  .raw-post-toggle.open .raw-chevron { transform: rotate(180deg); }
  .raw-post-toggle.open { border-radius: var(--radius) var(--radius) 0 0; border-bottom: none; }
  .raw-post-body { overflow: hidden; max-height: 0; transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1); background: var(--surface); border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--radius) var(--radius); }
  .raw-post-body.open { max-height: 600px; }
  .raw-post-body pre { padding: 16px 20px; font-family: var(--body); font-size: 13.5px; line-height: 1.8; color: #2a2f5a; white-space: pre-wrap; word-break: break-word; overflow-y: auto; max-height: 400px; font-weight: 450; }
  .btn-copy-raw { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; background: var(--accent-light); border: 1px solid rgba(67,97,238,0.22); border-radius: 6px; color: var(--accent); font-size: 13px; cursor: pointer; transition: all var(--tr); flex-shrink: 0; padding: 0; line-height: 1; }
  .btn-copy-raw:hover { background: var(--accent-mid); transform: scale(1.1); }
  .btn-copy-raw.copied { background: var(--green-bg); border-color: rgba(6,214,160,0.3); color: #038060; }
  .raw-toggle-right { display: flex; align-items: center; gap: 10px; }

  /* EMPTY / LOADING */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; gap: 14px; }
  .empty-icon { width: 64px; height: 64px; background: var(--accent-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; }
  .empty-state p { font-size: 14px; color: var(--text2); font-weight: 500; }
  .empty-state small { font-size: 12px; color: var(--text3); }
  .table-loading { display: flex; align-items: center; justify-content: center; padding: 60px; gap: 12px; color: var(--text3); font-size: 14px; }
  .table-loading .spinner { display: block; border-color: var(--border2); border-top-color: var(--accent); width: 20px; height: 20px; }

  /* TOASTS */
  #toastContainer { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 10px; z-index: 9999; pointer-events: none; }
  .toast { display: flex; align-items: center; padding: 13px 18px; border-radius: var(--radius); font-size: 13.5px; font-weight: 500; min-width: 240px; max-width: 380px; pointer-events: all; box-shadow: var(--shadow-md); animation: toastIn 0.25s ease forwards; border: 1px solid transparent; }
  .toast.success { background: #fff; border-color: var(--green); color: #038060; }
  .toast.error   { background: #fff; border-color: var(--red); color: var(--red); }
  .toast.fadeOut { animation: toastOut 0.25s ease forwards; }
  @keyframes toastIn  { from { opacity:0; transform:translateY(10px) scale(.97); } to { opacity:1; transform:none; } }
  @keyframes toastOut { from { opacity:1; } to { opacity:0; transform:translateY(6px); } }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @media (max-width: 860px) {
    :root { --sidebar: 260px; }
    .main-toolbar, .table-area { padding-inline: 16px; }
  }
  @media (max-width: 600px) {
    .layout { flex-direction: column; }
    aside { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">💼</div>
    <span class="logo-text">Job<span>Tracker</span></span>
  </div>
  <div class="spacer"></div>
  <div class="header-badge">✦ LLM-POWERED</div>
</header>

<div class="layout">
  <aside>
    <div>
      <div class="sidebar-label">Add Job Post</div>
      <textarea id="rawPost" placeholder="Paste a LinkedIn job post here...&#10;&#10;Include the full text with job title, location, description, and contact details for best extraction results."></textarea>
      <div class="char-count"><span id="charCount">0</span> chars</div>
    </div>
    <button class="btn-extract" id="extractBtn" onclick="handleExtract()">
      <div class="spinner"></div>
      <span class="btn-icon">⚡</span>
      Extract &amp; Save Job
    </button>
    <div class="tip-box">
      <p><strong>Tip:</strong> AI extracts <strong>job role</strong>, <strong>location</strong>, <strong>email</strong> &amp; <strong>description</strong>. Click <strong>▼ Details</strong> to see skills, full description &amp; the original post.</p>
    </div>
    <div>
      <div class="sidebar-label">Stats</div>
      <div class="stats-row">
        <div class="stat-card"><div class="val" id="statTotal">0</div><div class="lbl">Total Jobs</div></div>
        <div class="stat-card"><div class="val" id="statWithEmail">0</div><div class="lbl">With Email</div></div>
      </div>
    </div>
  </aside>

  <main>
    <div class="main-toolbar">
      <h2>Saved Jobs <span id="jobCountLabel"></span></h2>
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Filter by role or location…" oninput="handleSearch()" />
      </div>
    </div>
    <div class="table-area">
      <div id="tableWrapper"></div>
    </div>
  </main>
</div>

<div id="toastContainer"></div>

<script>
  const API = '';
  let allJobs = [];
  let openRows = new Set();
  let openRaw  = new Set();

  window.addEventListener('DOMContentLoaded', () => {
    loadJobs();
    const ta = document.getElementById('rawPost');
    ta.addEventListener('input', () => { document.getElementById('charCount').textContent = ta.value.length; });
  });

  async function loadJobs() {
    setTableLoading(true);
    try {
      const res = await fetch(API + '/jobs');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      allJobs = await res.json();
      renderTable(allJobs);
      updateStats(allJobs);
    } catch(e) {
      toast('Failed to load jobs: ' + e.message, 'error');
      setTableLoading(false);
    }
  }

  async function handleExtract() {
    const raw = document.getElementById('rawPost').value.trim();
    if (!raw) { toast('Please paste a job post first.', 'error'); return; }
    const btn = document.getElementById('extractBtn');
    btn.disabled = true; btn.classList.add('loading');
    try {
      const res = await fetch(API + '/extract', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({raw_post: raw})
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'HTTP ' + res.status);
      toast('✓ Saved: ' + (data.job_role || 'Unknown role'), 'success');
      document.getElementById('rawPost').value = '';
      document.getElementById('charCount').textContent = '0';
      openRows.clear(); openRaw.clear();
      await loadJobs();
    } catch(e) {
      toast('Extraction failed: ' + e.message, 'error');
    } finally {
      btn.disabled = false; btn.classList.remove('loading');
    }
  }

  async function deleteJob(id) {
    if (!confirm('Delete this job record?')) return;
    try {
      const res = await fetch(API + '/jobs/' + id, {method: 'DELETE'});
      if (!res.ok) throw new Error('HTTP ' + res.status);
      toast('Job deleted.', 'success');
      openRows.delete(id); openRaw.delete(id);
      await loadJobs();
    } catch(e) { toast('Delete failed: ' + e.message, 'error'); }
  }

  function handleSearch() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allJobs.filter(j =>
      (j.job_role||'').toLowerCase().includes(q) ||
      (j.job_location||'').toLowerCase().includes(q)
    );
    renderTable(filtered);
  }

  // Toggle main details panel
  function toggleDetails(id) {
    const inner = document.getElementById('detail-inner-' + id);
    const btn   = document.getElementById('expand-btn-' + id);
    const row   = document.getElementById('row-main-' + id);
    if (!inner) return;
    const isOpen = inner.classList.contains('open');
    if (isOpen) {
      inner.classList.remove('open'); btn.classList.remove('open'); row.classList.remove('expanded-row'); openRows.delete(id);
    } else {
      inner.classList.add('open'); btn.classList.add('open'); row.classList.add('expanded-row'); openRows.add(id);
    }
  }

  // Toggle raw post panel inside details
  function toggleRaw(id) {
    const body   = document.getElementById('raw-body-' + id);
    const toggle = document.getElementById('raw-toggle-' + id);
    if (!body) return;
    const isOpen = body.classList.contains('open');
    if (isOpen) {
      body.classList.remove('open'); toggle.classList.remove('open'); openRaw.delete(id);
    } else {
      body.classList.add('open'); toggle.classList.add('open'); openRaw.add(id);
    }
  }

  // ── Extract ALL skills/keywords from description ──────
  function extractSkills(desc) {
    if (!desc) return [];

    const allChips = [];

    // 1. Tech skills — broad list
    const techKw = [
      'Python','Java','JavaScript','TypeScript','C\\+\\+','C#','Go','Rust','Swift','Kotlin','PHP','Ruby','Scala','MATLAB','R',
      'React','Angular','Vue','Next\\.js','Node\\.js','Django','FastAPI','Flask','Spring','Rails','Laravel','Express',
      'SQL','PostgreSQL','MySQL','MongoDB','Redis','Elasticsearch','SQLite','Oracle','Cassandra','DynamoDB',
      'AWS','Azure','GCP','Docker','Kubernetes','Terraform','CI/CD','Jenkins','GitHub Actions','Ansible',
      'Machine Learning','Deep Learning','Artificial Intelligence','TensorFlow','PyTorch','NLP','Computer Vision',
      'OpenCV','YOLO','LLM','LangChain','RAG','Scikit-learn','Pandas','NumPy','Keras',
      'REST','GraphQL','Microservices','DevOps','Git','Linux','Unix','Bash','Shell',
      'HTML','CSS','SASS','Figma','Tableau','Power BI','Excel','Spark','Hadoop','Kafka',
      'Neural Networks','CNN','RNN','LSTM','Transformers','BERT','GPT',
      'Embedded','RTOS','Arduino','Raspberry Pi','IoT','PCB','VHDL','Verilog',
      'Android','iOS','Flutter','React Native','Xamarin',
      'Selenium','Pytest','JUnit','Testing','QA','Automation',
      'Logical thinking','Logical reasoning','Problem solving'
    ];

    // 2. Soft skills
    const softKw = [
      'communication','teamwork','leadership','collaboration','adaptable','proactive',
      'time management','self.motivated','creative','detail.oriented','attention to detail',
      'critical thinking','analytical','interpersonal','presentation','mentoring','ownership'
    ];

    // 3. Experience / education
    const expPatterns = [
      /\d+\+?\s*years?\s*(of\s+)?(experience|exp)/gi,
      /fresher/gi, /entry.level/gi, /senior/gi, /junior/gi, /mid.level/gi, /intern/gi,
      /Bachelor['\u2019]?s?\s*(degree)?/gi, /Master['\u2019]?s?\s*(degree)?/gi, /Ph\.?D/gi,
      /B\.?Tech/gi, /M\.?Tech/gi, /B\.?E\.?/gi, /MBA/gi
    ];

    const found = new Set();

    techKw.forEach(k => {
      if (new RegExp('\\b' + k + '\\b', 'i').test(desc)) {
        allChips.push({label: k.replace(/\\/g,''), type: 'tech'});
        found.add(k.toLowerCase());
      }
    });

    softKw.forEach(k => {
      const clean = k.replace(/\./g,' ');
      if (new RegExp('\\b' + k + '\\b', 'i').test(desc) && !found.has(clean)) {
        allChips.push({label: clean, type: 'soft'});
        found.add(clean);
      }
    });

    expPatterns.forEach(pat => {
      const matches = desc.match(pat);
      if (matches) matches.forEach(m => {
        const clean = m.trim();
        if (!found.has(clean.toLowerCase())) {
          allChips.push({label: clean, type: 'exp'});
          found.add(clean.toLowerCase());
        }
      });
    });

    // 4. Fallback: extract capitalized words/phrases not already caught
    if (allChips.length < 3) {
      const words = desc.match(/\b[A-Z][a-zA-Z0-9+#.]*(?:\s+[A-Z][a-zA-Z0-9+#.]*){0,2}\b/g) || [];
      words.forEach(w => {
        const wl = w.toLowerCase();
        if (w.length > 2 && !found.has(wl) && !['We','Our','This','The','For','You','Job','Are','Has','With','And','From'].includes(w)) {
          allChips.push({label: w, type: 'gen'});
          found.add(wl);
        }
      });
    }

    return allChips.slice(0, 30);
  }

  // ── Build detail panel ─────────────────────────────────
  function buildDetailPanel(job) {
    const chips = extractSkills(job.job_description);

    const skillsHtml = chips.length
      ? chips.map(c => '<span class="skill-chip ' + c.type + '">' + esc(c.label) + '</span>').join('')
      : '<span class="null-val">No specific skills detected</span>';

    const descHtml = job.job_description
      ? '<div class="full-desc">' + esc(job.job_description) + '</div>'
      : '<span class="null-val">No description available</span>';

    const isRawOpen = openRaw.has(job.id);
    const rawHtml = job.raw_post
      ? '<div class="raw-post-toggle ' + (isRawOpen ? 'open' : '') + '" id="raw-toggle-' + job.id + '" onclick="toggleRaw(' + job.id + ')">' +
          '<span class="raw-post-toggle-left">' +
            '📄 Original LinkedIn Post' +
            '<button class="btn-copy-raw" id="copy-raw-' + job.id + '" onclick="event.stopPropagation();copyRaw(this,' + job.id + ')" title="Copy full post">&#128203;</button>' +
          '</span>' +
          '<span class="raw-chevron">▼</span>' +
        '</div>' +
        '<div class="raw-post-body ' + (isRawOpen ? 'open' : '') + '" id="raw-body-' + job.id + '">' +
          '<pre id="raw-text-' + job.id + '">' + esc(job.raw_post) + '</pre>' +
        '</div>'
      : '';

    return '<div class="detail-content">' +
      '<div class="detail-section">' +
        '<div class="detail-section-title">Required Skills &amp; Technologies</div>' +
        '<div class="skills-grid">' + skillsHtml + '</div>' +
      '</div>' +
      '<div class="detail-section">' +
        '<div class="detail-section-title">Full Job Description</div>' +
        descHtml +
      '</div>' +
      (rawHtml ? rawHtml : '') +
    '</div>';
  }

  // ── Render table ──────────────────────────────────────
  function renderTable(jobs) {
    const wrapper = document.getElementById('tableWrapper');
    document.getElementById('jobCountLabel').textContent = jobs.length ? '(' + jobs.length + ')' : '';

    if (!jobs.length) {
      wrapper.innerHTML =
        '<div class="empty-state">' +
          '<div class="empty-icon">📋</div>' +
          '<p>No jobs saved yet</p>' +
          '<small>Paste a LinkedIn job post on the left to get started</small>' +
        '</div>';
      return;
    }

    let rows = '';
    jobs.forEach((j, i) => {
      const email = j.contact_email
        ? '<span class="email-text">' + esc(j.contact_email) + '</span>' +
          '<button class="btn-copy" onclick="copyEmail(this,\'' + esc(j.contact_email) + '\')">COPY</button>'
        : '<span class="null-val">—</span>';

      const loc = j.job_location
        ? '<div class="td-location"><div class="loc-dot"></div>' + esc(j.job_location) + '</div>'
        : '<span class="null-val">—</span>';

      const ds = j.job_description
        ? esc(j.job_description).substring(0, 80) + (j.job_description.length > 80 ? '…' : '')
        : '<span class="null-val">—</span>';

      const date = j.date_added ? formatDate(j.date_added) : '—';
      const isOpen = openRows.has(j.id);

      rows +=
        '<tr id="row-main-' + j.id + '" class="' + (isOpen ? 'expanded-row' : '') + '">' +
          '<td class="td-num">' + (i+1) + '</td>' +
          '<td class="td-role">' + (j.job_role ? esc(j.job_role) : '<span class="null-val">Unknown</span>') + '</td>' +
          '<td>' + loc + '</td>' +
          '<td><div class="email-cell">' + email + '</div></td>' +
          '<td><div class="desc-short">' + ds + '</div></td>' +
          '<td class="date-text">' + date + '</td>' +
          '<td><div class="actions-cell">' +
            '<button class="btn-expand ' + (isOpen ? 'open' : '') + '" id="expand-btn-' + j.id + '" onclick="toggleDetails(' + j.id + ')">' +
              '<i class="chevron">▼</i> Details' +
            '</button>' +
            '<button class="btn-delete" onclick="deleteJob(' + j.id + ')">Delete</button>' +
          '</div></td>' +
        '</tr>' +
        '<tr class="detail-row">' +
          '<td colspan="7">' +
            '<div class="detail-inner ' + (isOpen ? 'open' : '') + '" id="detail-inner-' + j.id + '">' +
              buildDetailPanel(j) +
            '</div>' +
          '</td>' +
        '</tr>';
    });

    wrapper.innerHTML =
      '<div class="table-card"><table>' +
        '<thead><tr>' +
          '<th>#</th><th>Job Role</th><th>Location</th>' +
          '<th>Email</th><th>Description</th><th>Date Added</th><th>Actions</th>' +
        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table></div>';
  }

  function updateStats(jobs) {
    document.getElementById('statTotal').textContent = jobs.length;
    document.getElementById('statWithEmail').textContent = jobs.filter(j => j.contact_email).length;
  }

  function copyRaw(btn, id) {
    const pre = document.getElementById('raw-text-' + id);
    if (!pre) return;
    navigator.clipboard.writeText(pre.innerText).then(() => {
      btn.textContent = '✓';
      btn.classList.add('copied');
      setTimeout(() => { btn.innerHTML = '&#128203;'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function copyEmail(btn, email) {
    navigator.clipboard.writeText(email).then(() => {
      btn.textContent = 'COPIED'; btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('copied'); }, 1800);
    });
  }

  function setTableLoading(on) {
    if (on) document.getElementById('tableWrapper').innerHTML =
      '<div class="table-loading"><div class="spinner"></div> Loading jobs…</div>';
  }

  function toast(msg, type='success') {
    const c = document.getElementById('toastContainer');
    const el = document.createElement('div');
    el.className = 'toast ' + type; el.textContent = msg; c.appendChild(el);
    setTimeout(() => { el.classList.add('fadeOut'); el.addEventListener('animationend', () => el.remove()); }, 3600);
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatDate(iso) {
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    return d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}) +
           ' ' + d.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
  }
</script>
